<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <title>MindFlow</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

        background: linear-gradient(135deg, #020617, #0f172a, #1e293b);

        color: white;
      }

      .app {
        width: 460px;
        padding: 40px;

        border-radius: 22px;

        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(25px);

        border: 1px solid rgba(255, 255, 255, 0.1);

        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
      }

      .title {
        font-size: 28px;
        font-weight: 700;

        margin-bottom: 6px;
      }

      .subtitle {
        opacity: 0.6;
        margin-bottom: 25px;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      button {
        flex: 1;

        border: none;
        border-radius: 12px;

        padding: 14px;

        background: linear-gradient(45deg, #6366f1, #22c55e);

        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      button.secondary {
        background: #334155;
      }

      .quote {
        font-size: 20px;
        line-height: 1.5;
        margin-top: 20px;
        min-height: 80px;
      }

      .stats {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        opacity: 0.6;
        font-size: 14px;
      }

      .history {
        margin-top: 25px;

        max-height: 120px;
        overflow: auto;

        font-size: 13px;
        opacity: 0.6;
      }

      .history div {
        margin-bottom: 6px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="title">✨ MindFlow</div>
      <div class="subtitle">Afirmações inteligentes ao longo do dia</div>

      <div class="controls">
        <button id="start">Ativar</button>

        <button class="secondary" id="manual">Nova frase</button>
      </div>

      <div class="quote" id="quote">Clique em ativar para começar</div>

      <div class="stats">
        <div>notificações: <span id="count">0</span></div>

        <div>streak: <span id="streak">0</span></div>
      </div>

      <div class="history" id="history"></div>
    </div>

    <script>
      /* =========================
CONFIG
========================= */

      const CONFIG = {
        INTERVAL: 1000 * 60,
      };

      /* =========================
AFIRMAÇÕES
========================= */

      class PhraseEngine {
        constructor() {
          this.phrases = [
            "Minha disciplina constrói meu futuro.",
            "Eu ajo mesmo quando não estou motivado.",
            "Consistência vence talento.",
            "Meu foco cria resultados.",
            "Eu sou responsável pelo meu destino.",
            "Cada pequeno passo importa.",
            "Minha mente está focada no progresso.",
            "Eu evoluo todos os dias.",
            "Eu confio no processo.",
            "Minha energia cria oportunidades.",
            "Persistência cria resultados extraordinários.",
            "Eu sou resiliente.",
            "Meu potencial é ilimitado.",
            "Eu tenho controle sobre minhas decisões.",
            "Disciplina hoje, liberdade amanhã.",
            "Eu sou capaz de alcançar qualquer meta.",
            "Eu aprendo com cada erro.",
            "Eu transformo desafios em crescimento.",
            "Eu mantenho minha mente forte.",
            "Minha determinação é maior que qualquer obstáculo.",

            "Eu sigo meu plano de trading.",
            "Eu respeito meu gerenciamento de risco.",
            "Eu não persigo o mercado.",
            "Eu opero com disciplina.",
            "Eu aceito perdas pequenas.",
            "Eu confio na minha estratégia.",
            "Meu foco é execução perfeita.",
            "Eu opero probabilidades, não emoções.",
            "Eu espero as melhores oportunidades.",
            "Eu sou paciente no mercado.",

            "Grandes resultados exigem consistência.",
            "O progresso vem da repetição.",
            "Disciplina cria liberdade.",
            "O futuro pertence aos persistentes.",
            "A clareza surge na ação.",
            "Pequenos hábitos mudam destinos.",
            "O foco cria momentum.",
            "A consistência vence a procrastinação.",
          ];

          // duplicar para gerar centenas

          for (let i = 0; i < 20; i++) {
            this.phrases = [...this.phrases, ...this.phrases];
          }
        }

        random() {
          return this.phrases[Math.floor(Math.random() * this.phrases.length)];
        }
      }

      /* =========================
NOTIFICAÇÕES
========================= */

      class NotificationManager {
        static async request() {
          if (!("Notification" in window)) return false;

          const permission = await Notification.requestPermission();

          return permission === "granted";
        }

        static send(message) {
          new Notification("Afirmação ✨", {
            body: message,
          });
        }
      }

      /* =========================
APP
========================= */

      class MindFlow {
        constructor() {
          this.engine = new PhraseEngine();

          this.count = 0;
          this.streak = 0;

          this.history = [];
        }

        start() {
          this.send();

          setInterval(() => {
            this.send();
          }, CONFIG.INTERVAL);
        }

        send() {
          const phrase = this.engine.random();

          NotificationManager.send(phrase);

          this.count++;
          this.streak++;

          this.history.unshift(phrase);

          this.render(phrase);
        }

        render(phrase) {
          document.getElementById("quote").innerText = phrase;

          document.getElementById("count").innerText = this.count;

          document.getElementById("streak").innerText = this.streak;

          const historyEl = document.getElementById("history");

          historyEl.innerHTML = this.history
            .slice(0, 10)
            .map((p) => `<div>${p}</div>`)
            .join("");
        }
      }

      /* =========================
INIT
========================= */

      const app = new MindFlow();

      document.getElementById("start").onclick = async () => {
        const granted = await NotificationManager.request();

        if (!granted) return;

        app.start();
      };

      document.getElementById("manual").onclick = () => {
        app.send();
      };
    </script>
  </body>
</html>
