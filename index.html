<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>MindFlow</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: system-ui, Inter;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
        color: white;
      }

      .app {
        width: 460px;
        padding: 40px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
      }

      .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 5px;
      }

      .subtitle {
        opacity: 0.6;
        margin-bottom: 25px;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      button {
        flex: 1;
        border: none;
        border-radius: 12px;
        padding: 14px;
        background: linear-gradient(45deg, #6366f1, #22c55e);
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      button.secondary {
        background: #334155;
      }

      .quote {
        font-size: 20px;
        line-height: 1.5;
        margin-top: 20px;
        min-height: 80px;
      }

      .stats {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        opacity: 0.6;
        font-size: 14px;
      }

      .history {
        margin-top: 25px;
        max-height: 120px;
        overflow: auto;
        font-size: 13px;
        opacity: 0.6;
      }

      .history div {
        margin-bottom: 6px;
      }
    </style>

    <script
      src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"
      defer
    ></script>
  </head>

  <body>
    <div class="app">
      <div class="title">✨ MindFlow</div>

      <div class="subtitle">Afirmações inteligentes ao longo do dia</div>

      <div class="controls">
        <button id="start">Ativar notificações</button>

        <button class="secondary" id="manual">Nova frase</button>
      </div>

      <div class="quote" id="quote">Clique em ativar para começar</div>

      <div class="stats">
        <div>notificações: <span id="count">0</span></div>

        <div>streak: <span id="streak">0</span></div>
      </div>

      <div class="history" id="history"></div>
    </div>

    <script>
      /* CONFIG */

      const CONFIG = {
        INTERVAL: 1000 * 60,
      };

      /* FRASES */

      class PhraseEngine {
        constructor() {
          this.phrases = [
            "Eu sou disciplinado e consistente.",
            "Eu sou capaz de alcançar grandes objetivos.",
            "Eu sou focado no que realmente importa.",
            "Eu sou responsável pelo meu próprio sucesso.",
            "Eu sou persistente diante dos desafios.",
            "Eu sou resiliente e aprendo com cada erro.",
            "Eu sou capaz de transformar esforço em resultado.",
            "Eu sou comprometido com meu crescimento.",
            "Eu sou determinado a evoluir todos os dias.",
            "Eu sou forte mentalmente.",
            "Eu sou grato pela jornada que estou vivendo.",
            "Eu sou capaz de superar qualquer obstáculo.",
            "Eu sou disciplinado mesmo quando não estou motivado.",
            "Eu sou constante em direção aos meus objetivos.",
            "Eu sou capaz de criar a vida que desejo.",
            "Eu sou focado e produtivo.",
            "Eu sou capaz de aprender qualquer coisa.",
            "Eu sou resiliente diante das dificuldades.",
            "Eu sou consistente nas minhas ações.",
            "Eu sou responsável pelas minhas escolhas.",

            "Eu sou um trader disciplinado.",
            "Eu sou paciente ao esperar as melhores oportunidades.",
            "Eu sou fiel ao meu plano de trading.",
            "Eu sou responsável pelo meu gerenciamento de risco.",
            "Eu sou calmo mesmo diante da volatilidade.",
            "Eu sou consistente na execução da minha estratégia.",
            "Eu sou focado no processo, não no resultado imediato.",
            "Eu sou disciplinado para aceitar pequenas perdas.",
            "Eu sou capaz de operar com clareza e controle.",
            "Eu sou um operador paciente e estratégico.",
          ];
        }

        random() {
          return this.phrases[Math.floor(Math.random() * this.phrases.length)];
        }
      }

      /* APP */

      class MindFlow {
        constructor() {
          this.engine = new PhraseEngine();

          this.count = 0;
          this.streak = 0;

          this.history = [];
        }

        send() {
          const phrase = this.engine.random();

          this.count++;
          this.streak++;

          this.history.unshift(phrase);

          this.render(phrase);
        }

        render(phrase) {
          document.getElementById("quote").innerText = phrase;
          document.getElementById("count").innerText = this.count;
          document.getElementById("streak").innerText = this.streak;

          const historyEl = document.getElementById("history");

          historyEl.innerHTML = this.history
            .slice(0, 10)
            .map((p) => `<div>${p}</div>`)
            .join("");
        }
      }

      /* INIT */

      const app = new MindFlow();

      document.getElementById("manual").onclick = () => {
        app.send();
      };

      /* ATIVAR ONESIGNAL */

      document.getElementById("start").onclick = () => {
        OneSignal.push(function () {
          OneSignal.showSlidedownPrompt();
        });
      };
    </script>

    <script src="onesignal-init.js"></script>
  </body>
</html>
